name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v1.2.3). Leave empty to use version from .version file.'
        required: false
        type: string

permissions:
  contents: "write"
  id-token: "write"

jobs:
  build:
    name: Upload Release Asset
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'adopt'
        check-latest: false
    - name: Build with Maven
      run: mvn -B install -DskipTests
    - name: Create Tag
      run: |
        RELEASE_TAG=$([ -n "${{ github.event.inputs.version }}" ] && echo "${{ github.event.inputs.version }}" || cat ./src/main/resources/.version)
        RELEASE_VER=${RELEASE_TAG#v}
        echo "RELEASE_TAG=$RELEASE_TAG" >> $GITHUB_ENV
        echo "RELEASE_VER=$RELEASE_VER" >> $GITHUB_ENV
    - name: Compute SHA256
      id: sha
      run: |
        FILE=./target/redis-rdb-cli-release.tar.gz
        SHA256=$(shasum -a 256 "$FILE" | awk '{print $1}')
        echo "SHA256=$SHA256" >> $GITHUB_ENV
    - name: Create Release
      id: create_release
      uses: ncipollo/release-action@v1
      with:
        allowUpdates: true
        artifacts: ./target/redis-rdb-cli-release.tar.gz,./target/redis-rdb-cli-release.zip
        tag: ${{ env.RELEASE_TAG }}
        name: ${{ env.RELEASE_TAG }}
        draft: false
        prerelease: false
        token: ${{ secrets.GITHUB_TOKEN }}
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    - name: Authenticate to Google Cloud
      id: auth
      uses: google-github-actions/auth@v3
      with:
        token_format: access_token
        workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
        service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
    - name: Login to GCP Artifact Registry
      uses: docker/login-action@v3
      with:
        registry: us-central1-docker.pkg.dev
        username: oauth2accesstoken
        password: ${{ steps.auth.outputs.access_token }}
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
    - name: Set up Docker Buildx
      id: buildx
      uses: docker/setup-buildx-action@v3
    - name: Build and Push
      id: latest
      uses: docker/build-push-action@v6
      with:
        context: ./
        file: ./Dockerfile
        platforms: linux/amd64,linux/arm64
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/${{ secrets.REPO }}:latest
          ${{ secrets.DOCKER_USERNAME }}/${{ secrets.REPO }}:${{ env.RELEASE_TAG }}
          us-central1-docker.pkg.dev/falkordb-public/public/${{ secrets.REPO }}:latest
          us-central1-docker.pkg.dev/falkordb-public/public/${{ secrets.REPO }}:${{ env.RELEASE_TAG }}
        cache-from: type=gha,scope=dockerfile
        cache-to: type=gha,mode=max,scope=dockerfile
    - name: Image digest
      run: echo ${{ steps.latest.outputs.digest }}
